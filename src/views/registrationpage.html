<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="styles/registrationpage.css">
</head>
<body>

    <div class="container">
        <h2 class="title">Registration</h2>

        <form class="form-box" id="regForm">

            <input type="text" placeholder="Username" class="input-field" id="username">
            <p class="error" id="err-username"></p>

            <div class="password-wrapper">
                <input type="password" placeholder="Password" class="input-field" id="password">
                <button type="button" class="show-btn" onclick="togglePassword('password', this)">👁</button>
            </div>
            <p class="error" id="err-password"></p>

            <div class="password-wrapper">
                <input type="password" placeholder="Confirm password" class="input-field" id="confirmPassword">
                <button type="button" class="show-btn" onclick="togglePassword('confirmPassword', this)">👁</button>
            </div>
            <p class="error" id="err-confirmPassword"></p>

            <input type="email" placeholder="Email" class="input-field" id="email">
            <p class="error" id="err-email"></p>

            <input type="email" placeholder="Confirm email" class="input-field" id="confirmEmail">
            <p class="error" id="err-confirmEmail"></p>

            <div class="captcha-box">
                <span id="captchaText"></span>
                <button type="button" id="refreshCaptcha">↻</button>
            </div>

            <input type="text" placeholder="Enter CAPTCHA" class="input-field" id="captchaInput">
            <p class="error" id="err-captcha"></p>


            <button type="submit" class="register-btn">register</button>
        </form>
    </div>

    <script>
            function togglePassword(id, btn) {
            const field = document.getElementById(id);
            field.type = field.type === "password" ? "text" : "password";
            btn.textContent = field.type === "password" ? "👁" : "👁️‍🗨️";
    }
    </script>


<script type="module">
    import { validateRegistration } from "../utils/validationSchemas.mjs";

    const form = document.getElementById("regForm");

         // --- CAPTCHA ---
    function generateCaptcha() {
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let code = "";
        for (let i = 0; i < 5; i++) {
        code += chars[Math.floor(Math.random() * chars.length)];
    }
    document.getElementById("captchaText").textContent = code;
    return code;
};

let currentCaptcha = generateCaptcha();

document.getElementById("refreshCaptcha").addEventListener("click", () => {
    currentCaptcha = generateCaptcha();
});


    form.addEventListener("submit", (e) => {
        e.preventDefault();

        const data = {
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value,
            confirmPassword: document.getElementById("confirmPassword").value,
            email: document.getElementById("email").value.trim(),
            confirmEmail: document.getElementById("confirmEmail").value.trim(),
        };

        document.querySelectorAll(".error").forEach(el => el.textContent = "");

        const errors = validateRegistration(data);

        if (Object.keys(errors).length === 0) {
            alert("Успішна реєстрація!");
        } else {
            if (errors.username) document.getElementById("err-username").textContent = errors.username;
            if (errors.password) document.getElementById("err-password").textContent = errors.password;
            if (errors.confirmPassword) document.getElementById("err-confirmPassword").textContent = errors.confirmPassword;
            if (errors.email) document.getElementById("err-email").textContent = errors.email;
            if (errors.confirmEmail) document.getElementById("err-confirmEmail").textContent = errors.confirmEmail;
        };

        // CAPTCHA validation
            if (document.getElementById("captchaInput").value.trim() !== currentCaptcha) {
            errors.captcha = "Невірна CAPTCHA";
        };

            if (errors.captcha) {
            document.getElementById("err-captcha").textContent = errors.captcha;
        }

    });
</script>

</body>
</html>
